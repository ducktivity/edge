# Suite-wide Vector pipeline: tail every app container's stdout on the box (JSON from each app's slog), enrich, and ship to BetterStack. One shipper for the whole box — docker_logs selects containers by the `collect_logs` label, across all Compose projects. Disk-buffered, so a BetterStack blip never blocks an app or drops logs.

data_dir: /var/lib/vector

sources:
  app_logs:
    type: docker_logs
    include_labels:
      - "collect_logs=true"

transforms:
  parse:
    type: remap
    inputs: [app_logs]
    source: |
      structured, err = parse_json(.message)
      if err == null {
        . = merge(., object(structured) ?? {})
        del(.message)
      }
      .container = .container_name
      del(.label)

sinks:
  betterstack:
    type: http
    inputs: [parse]
    uri: "${BETTERSTACK_INGEST_HOST}"
    method: post
    encoding:
      codec: json
    auth:
      strategy: bearer
      token: "${BETTERSTACK_SOURCE_TOKEN}"
    buffer:
      type: disk
      max_size: 268435488 # 256 MiB
      when_full: block
    request:
      retry_attempts: 10
    healthcheck:
      enabled: false
